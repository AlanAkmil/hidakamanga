<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Membaca — Hidaka Komik</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="app">
  <div class="reader-bar">
    <a class="back" id="backLink" href="index.html">←</a>
    <div class="ch-title" id="chTitle">Memuat...</div>
    <div style="width:18px;"></div>
  </div>

  <main class="reader-images" id="images">
    <div class="state-msg"><div class="spinner"></div>Memuat halaman...</div>
  </main>

  <div class="reader-nav">
    <button id="prevBtn">← Chapter Sebelumnya</button>
    <button id="nextBtn" class="primary">Chapter Selanjutnya →</button>
  </div>
</div>

<script src="js/app.js"></script>
<script>
const slug = qs('slug');
const chapter = parseInt(qs('chapter')) || 1;

document.getElementById('backLink').href = 'detail.html?slug=' + encodeURIComponent(slug || '');

async function init() {
  if (!slug) {
    document.getElementById('images').innerHTML = '<div class="state-msg">Chapter tidak ditemukan.</div>';
    return;
  }
  document.getElementById('chTitle').textContent = `Chapter ${chapter}`;
  try {
    const json = await API.chapter(slug, chapter);
    if (!json.success || json.data.error) throw new Error(json.data && json.data.error || json.error);
    const d = json.data;

    if (!d.images.length) {
      document.getElementById('images').innerHTML = '<div class="state-msg">Gambar chapter tidak ditemukan.</div>';
    } else {
      document.getElementById('images').innerHTML = d.images.map((src, i) =>
        `<img src="${API.img(src)}" loading="lazy" alt="Halaman ${i + 1}">`
      ).join('');
    }

    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');

    if (chapter > 1) {
      prevBtn.disabled = false;
      prevBtn.onclick = () => {
        location.href = `read.html?slug=${encodeURIComponent(slug)}&chapter=${chapter - 1}`;
      };
    } else {
      prevBtn.disabled = true;
    }

    nextBtn.disabled = false;
    nextBtn.onclick = () => {
      location.href = `read.html?slug=${encodeURIComponent(slug)}&chapter=${chapter + 1}`;
    };

    window.scrollTo({ top: 0 });
  } catch (e) {
    document.getElementById('images').innerHTML = '<div class="state-msg">Gagal memuat chapter. Coba lagi nanti.</div>';
  }
}
init();
</script>
</body>
</html>
